# Platform override for NVIDIA Jetson Orin (Nano/NX/AGX).
# Merged on top of fastlio2_default.yaml at launch time.

lio:
    lidar_filter_num: 8              # more aggressive downsample for ARM
    lidar_max_range: 25.0
    det_range: 50
    ieskf_max_iter: 3                # fewer iterations for real-time on ARM
    map_resolution: 0.4

pgo:
    submap_resolution: 0.15
    min_loop_detect_duration: 8.0    # less frequent loop detection

localizer:
    update_hz: 0.5                   # lower relocalization rate on ARM
    rough_scan_resolution: 0.3
    rough_map_resolution: 0.3
