# Jetson overlay — uses Jetson-specific base image and runtime
services:
  fast-livo2:
    build:
      dockerfile: docker/Dockerfile.jetson
    image: mapping_rbnx:jetson
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
